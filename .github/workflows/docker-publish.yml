name: Build and Push Docker Image to Aliyun ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 设置 QEMU 方便构建多架构镜像（可选）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 设置 Docker Buildx 以启用更高级的构建特性和缓存支持
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 生成日期版本号（采用北京时区 Asia/Shanghai，防止 UTC 时差导致日期不准）
      - name: Get Current Date Tag
        id: get-date
        run: |
          echo "tag=$(TZ=Asia/Shanghai date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date_only=$(TZ=Asia/Shanghai date +'%Y%m%d')" >> $GITHUB_OUTPUT

      # 登录到阿里云容器镜像服务 (ACR)
      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # 构建并推送镜像
      - name: Build and Push to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 显式指定构建多平台架构镜像，支持 AMD64 (x86_64) 和 ARM64 (Apple M系列/树莓派/ARM云服务器等)
          platforms: linux/amd64,linux/arm64
          # 同时发布三个标签：具体分秒时间戳（例如 20260610-114705）、日期（例如 20260610）和最新版（latest）
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ secrets.ALIYUN_REPOSITORY }}:${{ steps.get-date.outputs.tag }}
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ secrets.ALIYUN_REPOSITORY }}:${{ steps.get-date.outputs.date_only }}
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ secrets.ALIYUN_REPOSITORY }}:latest
          # 启用 GitHub Actions 缓存，加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
